<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#172033" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Trade Forge" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href="assets/app-icon.svg" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>Login | Trade Forge</title>
  <script>
    document.documentElement.dataset.theme = localStorage.getItem("trade-journal-theme") || "light";
  </script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-2: #eef2f7;
      --field: #ffffff;
      --text: #172033;
      --muted: #687386;
      --line: #dbe2ec;
      --accent: #1677ff;
      --accent-2: #13a16f;
      --danger: #e34850;
      --shadow: 0 18px 50px rgba(22, 32, 51, 0.12);
      --radius: 8px;
    }

    [data-theme="dark"] {
      color-scheme: dark;
      --bg: #0e121a;
      --surface: #171d28;
      --surface-2: #222b39;
      --field: #101620;
      --text: #eef4ff;
      --muted: #9ba8bc;
      --line: #2e394b;
      --accent: #5b9dff;
      --accent-2: #31c48d;
      --danger: #ff6872;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(22, 119, 255, 0.14), transparent 34rem),
        linear-gradient(135deg, var(--bg), var(--surface-2));
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      touch-action: manipulation;
    }

    .login-shell {
      width: min(460px, 100%);
      display: grid;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand img {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      object-fit: cover;
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.1;
    }

    .brand span {
      color: var(--muted);
    }

    .login-panel {
      padding: 34px;
      display: grid;
      align-content: center;
      gap: 22px;
    }

    .login-head h2 {
      margin: 0;
      font-size: 28px;
      line-height: 1.12;
    }

    .login-head p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .provider-list,
    .email-form {
      display: grid;
      gap: 12px;
    }

    .provider-btn,
    .primary-btn,
    .ghost-btn {
      min-height: 48px;
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0 14px;
      color: var(--text);
      background: var(--surface-2);
      border: 1px solid var(--line);
      font-weight: 700;
    }

    .provider-btn svg {
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
    }

    .discord-btn {
      background: #5865f2;
      color: #ffffff;
      border-color: #5865f2;
    }

    .divider {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: "";
      height: 1px;
      background: var(--line);
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    input {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px 12px;
      background: var(--field);
      color: var(--text);
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(22, 119, 255, 0.16);
    }

    .primary-btn {
      background: var(--accent);
      color: #ffffff;
      border-color: var(--accent);
    }

    .ghost-btn {
      background: transparent;
    }

    .status {
      min-height: 20px;
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .status.error {
      color: var(--danger);
    }

    .setup-note {
      margin: 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      background: var(--surface-2);
      font-size: 13px;
      line-height: 1.45;
    }

    @media (max-width: 760px) {
      body {
        padding: 0;
        place-items: stretch;
      }

      .login-shell {
        min-height: 100vh;
        border: 0;
        border-radius: 0;
      }

      .login-panel {
        padding: 22px 18px 30px;
        align-content: start;
      }

      .login-head h2 {
        font-size: 24px;
      }

      input,
      .provider-btn,
      .primary-btn,
      .ghost-btn {
        min-height: 48px;
      }
    }
  </style>
</head>
<body>
  <main class="login-shell">
    <section class="login-panel" aria-label="Login form">
      <div class="brand">
        <img src="assets/app-icon.svg" alt="Trade Forge logo" />
        <div>
          <h1>Trade Forge</h1>
          <span>Plan. Execute. Review.</span>
        </div>
      </div>
      <div class="login-head">
        <h2>Welcome back</h2>
        <p>Choose a provider or use a local login for now.</p>
      </div>

      <div class="provider-list">
        <button class="provider-btn discord-btn" id="discordLoginBtn" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M19.2 5.1A16 16 0 0 0 15.3 4l-.2.4c-.2.4-.4.8-.5 1.2a14.3 14.3 0 0 0-4.3 0 8.3 8.3 0 0 0-.7-1.6 16 16 0 0 0-3.9 1.1A16.8 16.8 0 0 0 2.9 16c1.6 1.2 3.2 1.9 4.7 2.1.4-.5.7-1 1-1.6-.6-.2-1.1-.5-1.6-.8l.4-.3a11.4 11.4 0 0 0 10.2 0l.4.3c-.5.3-1 .6-1.6.8.3.6.6 1.1 1 1.6 1.5-.2 3.1-.9 4.7-2.1a16.8 16.8 0 0 0-2.9-10.9ZM8.7 14.2c-.9 0-1.6-.8-1.6-1.8s.7-1.8 1.6-1.8 1.6.8 1.6 1.8-.7 1.8-1.6 1.8Zm6.6 0c-.9 0-1.6-.8-1.6-1.8s.7-1.8 1.6-1.8 1.6.8 1.6 1.8-.7 1.8-1.6 1.8Z"/>
          </svg>
          Continue with Discord
        </button>

      </div>

      <div class="divider">or</div>

      <form class="email-form" id="localLoginForm">
        <label>Email
          <input type="email" id="email" autocomplete="email" placeholder="you@example.com" required />
        </label>
        <label>Password
          <input type="password" id="password" autocomplete="current-password" placeholder="Your password" required />
        </label>
        <button class="primary-btn" type="submit">Login</button>
      </form>

      <button class="ghost-btn" id="guestLoginBtn" type="button">Continue as guest</button>
      <p class="status" id="loginStatus"></p>
      <p class="setup-note">Discord login uses your configured OAuth URL. Local and guest login stay stored in this browser.</p>
    </section>
  </main>

  <script>
    const AUTH_KEY = "ryze-journal-session";
    const DISCORD_CLIENT_ID = "1516134389119979661";
    const DISCORD_OAUTH_URL = "https://discord.com/oauth2/authorize?client_id=1516134389119979661&response_type=code&redirect_uri=https%3A%2F%2Ffocusbxck-prog.github.io%2FTrade-Forge%2F&scope=identify+email";
    const dashboardUrl = "index.html";

    const $ = (id) => document.getElementById(id);

    function saveSession(provider, name = "Trader") {
      localStorage.setItem(AUTH_KEY, JSON.stringify({
        provider,
        name,
        signedInAt: new Date().toISOString()
      }));
      window.location.href = dashboardUrl;
    }

    function oauthRedirect(provider) {
      if (provider === "discord" && DISCORD_CLIENT_ID) {
        window.location.href = DISCORD_OAUTH_URL;
        return;
      }

      saveSession("Discord demo");
    }

    function completeOAuthIfPresent() {
      const hash = new URLSearchParams(window.location.hash.slice(1));
      if (hash.get("access_token")) {
        saveSession("OAuth");
      }
    }

    completeOAuthIfPresent();

    $("discordLoginBtn").addEventListener("click", () => oauthRedirect("discord"));
    $("guestLoginBtn").addEventListener("click", () => saveSession("Guest"));
    $("localLoginForm").addEventListener("submit", (event) => {
      event.preventDefault();
      const email = $("email").value.trim();
      const password = $("password").value;
      if (!email || !password) {
        $("loginStatus").textContent = "Enter your email and password.";
        $("loginStatus").classList.add("error");
        return;
      }
      saveSession("Local", email);
    });

    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    }
  </script>
</body>
</html>
